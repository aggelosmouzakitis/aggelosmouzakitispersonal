name: Build blog index

on:
  push:
    paths:
      - 'blog/posts/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

    - name: Generate posts.json + pages
  run: |
    mkdir -p blog
    echo "[" > blog/posts.json
    first=true

    for file in blog/posts/*.md; do
      slug=$(basename "$file" .md)

      title=$(grep '^title:' "$file" | sed 's/title: //')
      date=$(grep '^date:' "$file" | sed 's/date: //')

      if [ "$first" = true ]; then
        first=false
      else
        echo "," >> blog/posts.json
      fi

      echo "{\"title\":\"$title\",\"date\":\"$date\",\"slug\":\"$slug\"}" >> blog/posts.json

      mkdir -p "blog/$slug"

      echo "<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>$title</title>
</head>
<body>
<script>
window.location.href = '/blog/post.html?slug=$slug';
</script>
</body>
</html>" > "blog/$slug/index.html"

    done

    echo "]" >> blog/posts.json
