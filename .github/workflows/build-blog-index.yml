name: Build blog index

on:
  push:
    paths:
      - "blog/posts/**"
      - ".github/workflows/build-blog-index.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate blog files
        run: |
          node .github/scripts/build-blog.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add blog/posts.json
          git add blog/*/index.html
          git diff --cached --quiet || git commit -m "Update generated blog pages"
          git push
