name: Build blog index

on:
  push:
    paths:
      - "blog/posts/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate posts.json
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const postsDir = 'blog/posts';
          const posts = fs.readdirSync(postsDir)
            .filter(file => file.endsWith('.md'))
            .map(file => {
              const content = fs.readFileSync(path.join(postsDir, file), 'utf8');
              const slug = file.replace('.md', '');
              const title = content.match(/title:\s*"(.+?)"/)?.[1] || slug;
              const description = content.match(/description:\s*"(.+?)"/)?.[1] || '';
              const date = content.match(/date:\s*"(.+?)"/)?.[1] || '';
              return { slug, title, description, date };
            })
            .sort((a, b) => new Date(b.date) - new Date(a.date));

          fs.writeFileSync('blog/posts.json', JSON.stringify(posts, null, 2));
          EOF
      - name: Commit posts.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add blog/posts.json
          git diff --cached --quiet || git commit -m "Update blog index"
          git push
