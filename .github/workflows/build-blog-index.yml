name: Build blog index

on:
  push:
    paths:
      - "blog/posts/**"
      - ".github/workflows/build-blog-index.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate posts.json and clean URL pages
        run: |
          node <<'NODE_SCRIPT'
          const fs = require('fs');
          const path = require('path');

          const postsDir = 'blog/posts';
          const blogDir = 'blog';

          if (!fs.existsSync(postsDir)) {
            process.exit(0);
          }

          const files = fs.readdirSync(postsDir).filter(file => file.endsWith('.md'));

          const posts = files.map(file => {
            const slug = file.replace('.md', '');
            const content = fs.readFileSync(path.join(postsDir, file), 'utf8');

            const titleMatch = content.match(/title:\s*["']?(.+?)["']?\s*$/m);
            const dateMatch = content.match(/date:\s*["']?(.+?)["']?\s*$/m);
            const descriptionMatch = content.match(/description:\s*["']?(.+?)["']?\s*$/m);

            const title = titleMatch ? titleMatch[1] : slug;
            const date = dateMatch ? dateMatch[1] : '';
            const description = descriptionMatch ? descriptionMatch[1] : '';

            const postDir = path.join(blogDir, slug);
            fs.mkdirSync(postDir, { recursive: true });

            const html = '<!DOCTYPE html>\n' +
              '<html>\n' +
              '<head>\n' +
              '  <meta charset="UTF-8">\n' +
              '  <title>' + title + '</title>\n' +
              '  <meta http-equiv="refresh" content="0; url=/blog/post.html?slug=' + slug + '">\n' +
              '  <link rel="canonical" href="https://aggelosmouzakitis.com/blog/' + slug + '/">\n' +
              '</head>\n' +
              '<body>\n' +
              '  <p>Redirecting to <a href="/blog/post.html?slug=' + slug + '">' + title + '</a></p>\n' +
              '</body>\n' +
              '</html>';

            fs.writeFileSync(path.join(postDir, 'index.html'), html);

            return { slug, title, date, description };
          });

          posts.sort((a, b) => new Date(b.date) - new Date(a.date));

          fs.writeFileSync(path.join(blogDir, 'posts.json'), JSON.stringify(posts, null, 2));
          NODE_SCRIPT

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add blog/posts.json
          git add blog/*/index.html
          git diff --cached --quiet || git commit -m "Update generated blog pages"
          git push
